# we need service, headless service, statefulset
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: ellamma-namaspace
spec:
  selector:
    project: ellamma-namaspace
    component: mongodb
    tier: db
  ports:
    - protocol: TCP
      port: 27017 #service port
      targetPort: 27017 #container port

---

apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: ellamma-namaspace
spec:
  # if the service clusterIP none then it is a headless service
  clusterIP: None
  selector:
    project: ellamma-namaspace
    component: mongodb
    tier: db
  ports:
    - protocol: TCP
      port: 27017 #service port
      targetPort: 27017 #container port

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: ellamma-namaspace
spec:
  selector:
    matchLabels:
      project: ellamma-namaspace
      component: mongodb
      tier: db
  serviceName: "mongodb-headless" # this is headless service name
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        project: ellamma-namaspace
        component: mongodb
        tier: db
    spec:
      containers:
      - name: mongodb
        image: shankarntr/mongodb:v1
        volumeMounts:
        - name: mongodb
          mountPath: /data/db
  # this is pvc
  volumeClaimTemplates:
  - metadata:
      name: mongodb
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ellamma-ebs"
      resources:
        requests:
          storage: 1Gi