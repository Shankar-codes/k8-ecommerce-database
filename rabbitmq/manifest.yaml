# we need service, headless service, statefulset
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: ellamma-namaspace
spec:
  selector:
    project: ellamma-namaspace
    component: rabbitmq
    tier: db
  ports:
    - protocol: TCP
      port: 5672 #service port
      targetPort: 5672 #container port

---

apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: ellamma-namaspace
spec:
  # if the service clusterIP none then it is a headless service
  clusterIP: None
  selector:
    project: ellamma-namaspace
    component: rabbitmq
    tier: db
  ports:
    - protocol: TCP
      port: 5672 #service port
      targetPort: 5672 #container port

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: ellamma-namaspace
spec:
  selector:
    matchLabels:
      project: ellamma-namaspace
      component: rabbitmq
      tier: db
  serviceName: "rabbitmq-headless" # this is headless service name
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        project: ellamma-namaspace
        component: rabbitmq
        tier: db
    spec:
      containers:
      - name: rabbitmq
        image: shankarntr/rabbitmq:v1
        volumeMounts:
        - name: rabbitmq
          mountPath: /var/lib/rabbitmq
  # this is pvc
  volumeClaimTemplates:
  - metadata:
      name: rabbitmq
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ellamma-ebs"
      resources:
        requests:
          storage: 1Gi