# we need service, headless service, statefulset
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ellamma-namaspace
spec:
  selector:
    project: ellamma-namaspace
    component: redis
    tier: db
  ports:
    - protocol: TCP
      port: 6379 #service port
      targetPort: 6379 #container port

---

apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: ellamma-namaspace
spec:
  # if the service clusterIP none then it is a headless service
  clusterIP: None
  selector:
    project: ellamma-namaspace
    component: redis
    tier: db
  ports:
    - protocol: TCP
      port: 6379 #service port
      targetPort: 6379 #container port

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: ellamma-namaspace
spec:
  selector:
    matchLabels:
      project: ellamma-namaspace
      component: redis
      tier: db
  serviceName: "redis-headless" # this is headless service name
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        project: ellamma-namaspace
        component: redis
        tier: db
    spec:
      containers:
      - name: redis
        image: shankarntr/redis:v1
        volumeMounts:
        - name: redis
          mountPath: /data
  # this is pvc
  volumeClaimTemplates:
  - metadata:
      name: redis
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ellamma-ebs"
      resources:
        requests:
          storage: 1Gi